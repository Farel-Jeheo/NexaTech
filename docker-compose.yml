version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexatech-web
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./style.css:/usr/share/nginx/html/style.css:ro
    environment:
      - TZ=Asia/Jakarta
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - nexatech-net

networks:
  nexatech-net:
    driver: bridge
